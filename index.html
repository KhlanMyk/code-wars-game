<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena — Python Strategy Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="logo">
                <span class="logo-icon">⚔️</span>
                <h1 class="logo-text">CodeArena</h1>
                <span class="tagline">Write Python · Command Armies · Destroy the Enemy</span>
            </div>
            <div class="stats-bar">
                <div class="stat player-stat">
                    <span class="stat-icon">🪙</span>
                    <span class="stat-label">Your Gold</span>
                    <span class="stat-value" id="player-gold">200</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">⏱</span>
                    <span class="stat-label">Turn</span>
                    <span class="stat-value" id="turn-counter">0 / 150</span>
                </div>
                <div class="stat enemy-stat">
                    <span class="stat-icon">🪙</span>
                    <span class="stat-label">Bot Gold</span>
                    <span class="stat-value" id="enemy-gold">???</span>
                </div>
            </div>
            <div class="health-bars">
                <div class="health-bar-container">
                    <span class="hb-label">🏰 Your Base</span>
                    <div class="health-bar">
                        <div class="health-fill player-health" id="player-health" style="width:100%"></div>
                    </div>
                    <span class="hb-value" id="player-hp">1000 / 1000</span>
                </div>
                <div class="health-bar-container">
                    <span class="hb-label">🏰 Enemy Base</span>
                    <div class="health-bar">
                        <div class="health-fill enemy-health" id="enemy-health" style="width:100%"></div>
                    </div>
                    <span class="hb-value" id="enemy-hp">1000 / 1000</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main">
            <!-- Game Canvas -->
            <div id="canvas-container">
                <canvas id="game-canvas"></canvas>
                <div id="game-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2 id="overlay-title"></h2>
                        <p id="overlay-message"></p>
                        <button id="overlay-btn" class="btn btn-primary">Play Again</button>
                    </div>
                </div>
            </div>

            <!-- Editor + Console Panel -->
            <div id="side-panel">
                <!-- Editor -->
                <div id="editor-panel">
                    <div class="panel-header">
                        <span class="panel-title">📝 Strategy Code (Python)</span>
                        <div class="example-selector">
                            <select id="example-select">
                                <option value="">Load Example…</option>
                                <option value="rush">⚔️ Rush Warriors</option>
                                <option value="economy">💰 Economy Build</option>
                                <option value="balanced">⚖️ Balanced Army</option>
                                <option value="archer">🏹 Archer Defense</option>
                            </select>
                        </div>
                    </div>
                    <div id="editor-wrapper">
                        <textarea id="code-editor"></textarea>
                    </div>

                    <!-- Controls -->
                    <div class="controls">
                        <button id="btn-run" class="btn btn-primary" title="Run your strategy (Ctrl+Enter)">▶ Run Battle</button>
                        <button id="btn-step" class="btn btn-secondary" title="Execute one turn">⏭ Step</button>
                        <button id="btn-pause" class="btn btn-secondary" disabled title="Pause the battle">⏸ Pause</button>
                        <button id="btn-reset" class="btn btn-danger" title="Reset the game">↺ Reset</button>
                        <div class="speed-control">
                            <label for="speed-slider">Speed</label>
                            <input type="range" id="speed-slider" min="1" max="5" value="3">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
</body>
</html>
